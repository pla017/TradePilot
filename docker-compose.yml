services:
  tradepilot:
    build:
      context: .
    image: tradepilot-classroom:latest
    container_name: tradepilot-classroom
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      HOST: 0.0.0.0
    ports:
      - "${HOST_PORT:-80}:3000"
    volumes:
      - ./data:/app/runtime-data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
